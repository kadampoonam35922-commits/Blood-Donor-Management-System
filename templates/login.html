<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial, sans-serif;
            min-height:100vh;

            background:
                linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
                url('https://images.unsplash.com/photo-1584515933487-779824d29309?q=80&w=1600&auto=format&fit=crop');

            background-size:cover;
            background-position:center;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
        }

        .login-box{
            width:400px;
            padding:40px;
            background:rgba(255,255,255,0.12);
            backdrop-filter:blur(12px);
            border-radius:20px;
            color:white;
            box-shadow:0 5px 25px rgba(0,0,0,0.5);
            animation:fadeIn 1.5s ease;
        }

        .login-box h2{
            text-align:center;
            margin-bottom:30px;
            font-size:38px;
            color:#ffcccc;
        }

        .login-box input{
            width:100%;
            padding:15px;
            margin:12px 0;
            border:none;
            border-radius:10px;
            outline:none;
            font-size:16px;
        }

        .login-box button{
            width:100%;
            padding:15px;
            margin-top:20px;
            border:none;
            border-radius:10px;
            background:red;
            color:white;
            font-size:18px;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
        }

        .login-box button:hover{
            background:white;
            color:red;
            transform:scale(1.03);
        }

        .error{
            margin-top:15px;
            text-align:center;
            color:yellow;
            font-size:16px;
        }

        @keyframes fadeIn{

            from{
                opacity:0;
                transform:translateY(50px);
            }

            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        @media(max-width:500px){

            .login-box{
                width:100%;
                padding:30px;
            }

            .login-box h2{
                font-size:30px;
            }
        }

    </style>

</head>

<body>

    <div class="login-box">

        <h2>Login</h2>

        <form method="post">

            {% csrf_token %}

            <input type="text"
                   name="phone"
                   placeholder="Phone Number"
                   required>

            <input type="password"
                   name="password"
                   placeholder="Password"
                   required>

            <button type="submit">Login</button>

        </form>

        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}

    </div>

    {% if success %}

    <script>

        alert("Login Successful");

        window.location.href="/";

    </script>

    {% endif %}

</body>
</html>
