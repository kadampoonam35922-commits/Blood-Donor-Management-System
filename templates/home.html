<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blood Donor Home</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial, sans-serif;
            height:100vh;

            /* Background Image */
            background:
                linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
                url(https://img.magnific.com/free-vector/blood-donor-nurse_74855-6262.jpg);

            background-size:cover;
            background-position:center;
            background-repeat:no-repeat;
            overflow:hidden;
        }

        /* Navbar */

        .navbar{
            width:100%;
            padding:20px 40px;
            display:flex;
            justify-content:flex-end;
            align-items:center;
            background:rgba(255,255,255,0.1);
            backdrop-filter:blur(10px);
            animation:slideDown 1s ease;
        }

        .navbar a{
            color:white;
            text-decoration:none;
            margin-left:30px;
            font-size:20px;
            font-weight:bold;
            transition:0.3s;
            position:relative;
        }

        .navbar a:hover{
            color:yellow;
            transform:scale(1.1);
        }

        .navbar a::after{
            content:'';
            position:absolute;
            width:0%;
            height:3px;
            background:white;
            left:0;
            bottom:-5px;
            transition:0.4s;
        }

        .navbar a:hover::after{
            width:100%;
        }

        /* Center Content */

        .content{
            height:85vh;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            color:white;
            text-align:center;
            animation:fadeIn 2s ease;
            padding:20px;
        }

        .content h1{
            font-size:60px;
            margin-bottom:20px;
            animation:zoomIn 2s ease;
            text-shadow:2px 2px 10px black;
        }

        .content p{
            font-size:24px;
            width:70%;
            line-height:40px;
            text-shadow:1px 1px 8px black;
        }

        /* Button */

        .btn{
            margin-top:30px;
            padding:15px 35px;
            border:none;
            border-radius:30px;
            background:#ff4b5c;
            color:white;
            font-size:20px;
            font-weight:bold;
            cursor:pointer;
            transition:0.4s;
            box-shadow:0 5px 15px rgba(0,0,0,0.3);
        }

        .btn:hover{
            background:white;
            color:#ff4b5c;
            transform:scale(1.1);
        }

        /* Animations */

        @keyframes slideDown{
            from{
                transform:translateY(-100px);
                opacity:0;
            }

            to{
                transform:translateY(0);
                opacity:1;
            }
        }

        @keyframes fadeIn{
            from{
                opacity:0;
            }

            to{
                opacity:1;
            }
        }

        @keyframes zoomIn{
            from{
                transform:scale(0.5);
                opacity:0;
            }

            to{
                transform:scale(1);
                opacity:1;
            }
        }

        /* Responsive */

        @media(max-width:768px){

            .content h1{
                font-size:40px;
            }

            .content p{
                width:90%;
                font-size:18px;
                line-height:30px;
            }

            .navbar{
                justify-content:center;
            }

            .navbar a{
                margin:0 10px;
                font-size:18px;
            }
        }

    </style>

</head>

<body>

    <div class="navbar">

        <a href="{% url 'register' %}">Register</a>

        <a href="{% url 'login' %}">Login</a>

        <a href="{% url 'search' %}">Search</a>

        <a href="{% url 'about' %}">About Us</a>
        <a href="{% url 'contact' %}">Contact Us</a>
        <a href="{% url 'logout' %}">Logout</a>

    </div>

    <div class="content">

        <h1>Blood Donor Management System</h1>

        <p>
            Save lives by connecting blood donors with people in need.
            Fast, secure, and easy donor search system.
        </p>

    </div>

</body>
</html>
