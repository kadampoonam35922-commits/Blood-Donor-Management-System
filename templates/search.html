<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Donor</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial, sans-serif;

            background:
                linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
                url('https://images.unsplash.com/photo-1584515933487-779824d29309?q=80&w=1600&auto=format&fit=crop');

            background-size:cover;
            background-position:center;

            min-height:100vh;
            padding:40px;
        }

        .container{
            background:rgba(255,255,255,0.12);
            backdrop-filter:blur(10px);
            padding:30px;
            width:550px;
            margin:auto;
            border-radius:20px;
            color:white;
            box-shadow:0px 0px 20px rgba(0,0,0,0.5);
            animation:fade 1s ease;
        }

        h2{
            text-align:center;
            color:#ffcccc;
            margin-bottom:20px;
            font-size:38px;
        }

        select{
            width:100%;
            padding:14px;
            margin-top:15px;
            border:none;
            border-radius:10px;
            font-size:16px;
            outline:none;
        }

        button{
            width:100%;
            padding:14px;
            margin-top:20px;
            border:none;
            background:red;
            color:white;
            font-size:18px;
            border-radius:10px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:white;
            color:red;
            transform:scale(1.03);
        }

        .result{
            margin-top:20px;
            padding:20px;
            background:rgba(255,255,255,0.15);
            border-radius:15px;
            animation:slideUp 1s ease;
            line-height:30px;
        }

        .result p{
            font-size:18px;
        }

        @keyframes fade{

            from{
                opacity:0;
            }

            to{
                opacity:1;
            }
        }

        @keyframes slideUp{

            from{
                transform:translateY(50px);
                opacity:0;
            }

            to{
                transform:translateY(0);
                opacity:1;
            }
        }

        @media(max-width:650px){

            .container{
                width:100%;
            }
        }

    </style>

</head>

<body>

<div class="container">

    <h2>Search Donor</h2>

    <form method="POST">

        {% csrf_token %}

        <select name="blood">

            <option value="">Select Blood Group</option>

            <option>A+</option>
            <option>A-</option>
            <option>B+</option>
            <option>B-</option>
            <option>O+</option>
            <option>O-</option>
            <option>AB+</option>
            <option>AB-</option>

        </select>

        <button type="submit">Search</button>

    </form>

    {% for d in donors %}

    <div class="result">

        <p><b>Name:</b> {{ d.name }}</p>

        <p><b>Gender:</b> {{ d.gender }}</p>

        <p><b>Email:</b> {{ d.email }}</p>

        <p><b>Phone:</b> {{ d.phone }}</p>

        <p><b>Blood Group:</b> {{ d.blood }}</p>

        <p><b>State:</b> {{ d.state }}</p>

        <p><b>City:</b> {{ d.city }}</p>

    </div>

    {% empty %}

    <div class="result">

        <p>No donors found.</p>

    </div>

    {% endfor %}

</div>

</body>
</html>
