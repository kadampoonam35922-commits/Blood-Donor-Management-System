<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial, sans-serif;
            min-height:100vh;

            background:
                linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
                url('https://images.unsplash.com/photo-1516549655169-df83a0774514?q=80&w=1600&auto=format&fit=crop');

            background-size:cover;
            background-position:center;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
        }

        .contact-box{
            width:500px;
            padding:40px;
            background:rgba(255,255,255,0.12);
            backdrop-filter:blur(12px);
            border-radius:20px;
            color:white;
            box-shadow:0 5px 25px rgba(0,0,0,0.5);
        }

        .contact-box h1{
            text-align:center;
            margin-bottom:25px;
            font-size:40px;
            color:#ffcccc;
        }

        .office-info{
            margin-bottom:25px;
            background:rgba(255,255,255,0.1);
            padding:20px;
            border-radius:15px;
            line-height:30px;
        }

        .office-info h3{
            margin-bottom:10px;
            color:yellow;
        }

        .contact-box input,
        .contact-box textarea{
            width:100%;
            padding:15px;
            margin:12px 0;
            border:none;
            border-radius:10px;
            outline:none;
            font-size:16px;
        }

        .contact-box textarea{
            height:140px;
            resize:none;
        }

        .contact-box button{
            width:100%;
            padding:15px;
            margin-top:15px;
            border:none;
            border-radius:10px;
            background:red;
            color:white;
            font-size:18px;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
        }

        .contact-box button:hover{
            background:white;
            color:red;
        }

        @media(max-width:600px){

            .contact-box{
                width:100%;
                padding:30px;
            }

            .contact-box h1{
                font-size:32px;
            }
        }

    </style>
</head>

<body>

    <div class="contact-box">

        <h1>Contact Us</h1>

        <!-- Office Details -->

        <div class="office-info">

            <h3>Blood Donor Management Office</h3>

            <p><strong>Address:</strong><br>
            2nd Floor, Red Cross Building,<br>
            MG Road, Hyderabad, Telangana, India</p>

            <p><strong>Phone:</strong> +91 9876543210</p>

            <p><strong>Email:</strong> support@blooddonor.com</p>

        </div>

</body>
</html>
