<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial, sans-serif;
            min-height:100vh;

            background:
                linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
                url('https://images.unsplash.com/photo-1615461066841-6116e61058f4?q=80&w=1600&auto=format&fit=crop');

            background-size:cover;
            background-position:center;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:30px;
        }

        .register-box{
            width:420px;
            padding:40px;
            background:rgba(255,255,255,0.12);
            backdrop-filter:blur(12px);
            border-radius:20px;
            color:white;
            box-shadow:0 5px 25px rgba(0,0,0,0.5);
        }

        .register-box h1{
            text-align:center;
            margin-bottom:30px;
            font-size:40px;
            color:#ffcccc;
        }

        .register-box input,
        .register-box select{
            width:100%;
            padding:15px;
            margin:12px 0;
            border:none;
            border-radius:10px;
            outline:none;
            font-size:16px;
        }

        .register-box button{
            width:100%;
            padding:15px;
            margin-top:20px;
            border:none;
            border-radius:10px;
            background:red;
            color:white;
            font-size:18px;
            font-weight:bold;
            cursor:pointer;
        }

        .register-box button:hover{
            background:white;
            color:red;
        }

    </style>

</head>

<body>

    <div class="register-box">

        <h1>Register</h1>

        <form method="POST" action="">

            {% csrf_token %}

            <input type="text"
                   name="name"
                   placeholder="Full Name"
                   required>

            <select name="gender" required>

                <option value="">Select Gender</option>

                <option>Male</option>

                <option>Female</option>

                <option>Other</option>

            </select>

            <input type="email"
                   name="email"
                   placeholder="Email Address"
                   required>

            <input type="text"
                   name="phone"
                   placeholder="Phone Number"
                   required>

            <select name="blood" required>

                <option value="">Select Blood Group</option>

                <option>A+</option>
                <option>A-</option>
                <option>B+</option>
                <option>B-</option>
                <option>AB+</option>
                <option>AB-</option>
                <option>O+</option>
                <option>O-</option>

            </select>

            <input type="text"
                   name="state"
                   placeholder="State"
                   required>

            <input type="text"
                   name="city"
                   placeholder="City"
                   required>

            <input type="password"
                   name="password"
                   placeholder="Password"
                   required>

            <button type="submit">Register</button>

        </form>

    </div>

    {% if success %}

    <script>

        alert("Registration Successful");

        window.location.href="/login/";

    </script>

    {% endif %}

</body>
</html>
